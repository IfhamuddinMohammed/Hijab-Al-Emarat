<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#1C0F00"/>

  <!-- Gold border frame -->
  <rect x="1.5" y="1.5" width="29" height="29" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>

  <!-- Serif "H" letterform -->
  <!-- Left vertical stroke -->
  <rect x="7" y="8" width="2.8" height="16" fill="#D4AF37"/>
  <!-- Right vertical stroke -->
  <rect x="22.2" y="8" width="2.8" height="16" fill="#D4AF37"/>
  <!-- Horizontal crossbar -->
  <rect x="9.8" y="14.1" width="12.4" height="3.8" fill="#D4AF37"/>

  <!-- Top ornament diamond -->
  <polygon points="16,2.5 17,4 16,5.5 15,4" fill="#D4AF37" opacity="0.8"/>
  <!-- Bottom ornament diamond -->
  <polygon points="16,26.5 17,28 16,29.5 15,28" fill="#D4AF37" opacity="0.8"/>
</svg>
